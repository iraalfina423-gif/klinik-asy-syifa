<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Flowchart Pendaftaran Klinik</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .flowchart { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .box {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            border: 2px solid #2c3e50;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            width: 250px;
            position: relative;
        }

        /* Simbol Keputusan (Belah Ketupat) */
        .decision {
            background: #f1c40f;
            width: 150px;
            height: 150px;
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        .decision span { transform: rotate(-45deg); font-weight: bold; }

        /* Garis Penghubung */
        .arrow { width: 2px; height: 20px; background: #2c3e50; position: relative; }
        .arrow::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -4px;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 10px solid #2c3e50;
        }

        .row { display: flex; gap: 50px; align-items: flex-start; }
        .start-end { border-radius: 50px; background: #e74c3c; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="flowchart">
    <div class="box start-end">MULAI</div>
    <div class="arrow"></div>

    <div class="box">Ambil Nomor Antrean & Skrining</div>
    <div class="arrow"></div>

    <div class="decision">
        <span>Pasien Baru?</span>
    </div>

    <div class="row">
        <div class="flowchart">
            <div class="box" style="border-color: #27ae60;"><b>YA:</b> Isi Formulir & Input Data Pasien</div>
            <div class="arrow"></div>
            <div class="box">Pilih Poli & Dokter Tujuan</div>
        </div>

        <div class="flowchart">
            <div class="box" style="border-color: #2980b9;"><b>TIDAK:</b> Verifikasi Rekam Medis / Kartu Berobat</div>
            <div class="arrow"></div>
            <div class="box">Pilih Poli & Dokter Tujuan</div>
        </div>
    </div>

    <div class="arrow"></div>
    
    <div class="box">Administrasi (Umum / BPJS / Asuransi)</div>
    <div class="arrow"></div>

    <div class="box start-end" style="background: #27ae60;">MENUJU RUANG TUNGGU</div>
</div>

</body>
</html>
