<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Flowchart Pendaftaran Pasien Rawat Jalan</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; }
        
        .flowchart-container { display: flex; flex-direction: column; align-items: center; gap: 20px; }

        /* Gaya Kotak Proses */
        .step {
            background: white;
            border: 2px solid #2c3e50;
            padding: 15px 25px;
            border-radius: 8px;
            width: 250px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Gaya Kotak Keputusan (Belah Ketupat) */
        .decision {
            background: #f1c40f;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
            border: 2px solid #2c3e50;
            margin: 20px 0;
        }

        .decision span { transform: rotate(-45deg); font-weight: bold; text-align: center; }

        /* Panah Penghubung */
        .arrow {
            width: 2px;
            height: 30px;
            background: #2c3e50;
            position: relative;
        }

        .arrow::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -4px;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 10px solid #2c3e50;
        }

        .start-end { border-radius: 50px; background: #27ae60; color: white; border: none; }
    </style>
</head>
<body>

<div class="flowchart-container">
    <div class="step start-end">PASIEN DATANG</div>
    <div class="arrow"></div>

    <div class="step">Ambil Nomor Antrean & Tunggu Panggilan</div>
    <div class="arrow"></div>

    <div class="step">Loket Pendaftaran (Identifikasi Pasien)</div>
    <div class="arrow"></div>

    <div class="decision">
        <span>Pasien Baru?</span>
    </div>

    <div class="step" style="border-color: #e67e22;">YA: Isi Formulir Identitas & Buat Rekam Medis Baru</div>
    <div class="arrow"></div>
    <div class="step" style="border-color: #2980b9;">TIDAK: Cari Data Rekam Medis (KIB/NIK)</div>
    <div class="arrow"></div>

    <div class="step">Verifikasi Penjamin (BPJS/Umum)</div>
    <div class="arrow"></div>

    <div class="step">Pasien Menuju Ruang Tunggu Poli Tujuan</div>
    <div class="arrow"></div>
    <div class="step start-end" style="background: #c0392b;">SELESAI (Pendaftaran)</div>
</div>

</body>
</html>
